name: claudeclaw-ops-triage
title: ClaudeClaw ops triage workflow
description: Investigate ClaudeClaw operational symptoms, review evidence, and recommend safe remediation steps.
requirement: FLOW-04
summary: Run VPS/service health checks, log review, and safe remediation recommendations.

policy:
  routing: docs/agent-workflow-routing.md
  observability: docs/archon-observability.md
  runbook: docs/incident-runbook.md
  approval: Noah approval is required before restarts, deploys, credential changes, or production data mutation.

inputs:
  - name: symptom
    required: true
    description: User-visible failure, alert, service symptom, or operational concern.
  - name: affected-service
    required: false
    description: Optional claudeclaw-* systemd service or subsystem.

nodes:
  - id: health-checks
    prompt: |
      Inspect service status with systemctl --user.
      Check dashboard and runtime health surfaces when available.
      Keep checks read-only until remediation is approved.
  - id: log-review
    depends_on: [health-checks]
    prompt: |
      Inspect recent logs with journalctl --user.
      Correlate symptoms to service, time window, and recent deploys or config changes.
  - id: remediation
    depends_on: [log-review]
    prompt: |
      Produce ranked remediation options with blast radius and rollback.
      Stop before restart, deploy, credential edit, issue closure, or production data mutation unless Noah approval is explicit.
  - id: report
    depends_on: [remediation]
    prompt: |
      Read docs/archon-observability.md.
      Include symptom, evidence, commands run, likely cause, recommended next step, and approval needed.
      Include workflow name and run ID or branch.
      If any node failed, include failing node and recovery action.
