name: claudeclaw-coding-plan-to-pr
title: ClaudeClaw coding plan-to-PR workflow
description: Turn a ClaudeClaw coding objective into scoped implementation, validation, and PR/report output.
requirement: FLOW-01
summary: Plan, implement, validate, and produce PR/report output for ClaudeClaw code work.

policy:
  routing: docs/agent-workflow-routing.md
  workspace: docs/archon-workspaces.md
  run_cwd: /home/devuser/claudeclaw-worktrees/<run-id>
  guard: scripts/archon-workspace-guard.sh
  production_checkout: /home/devuser/claudeclaw is discovery-only, not an implementation cwd.

inputs:
  - name: run-id
    required: true
    description: Unique worktree run identifier under /home/devuser/claudeclaw-worktrees/<run-id>.
  - name: objective
    required: true
    description: Coding objective or plan reference.
  - name: base-ref
    required: false
    default: origin/main

nodes:
  - id: workspace-guard
    bash: |
      scripts/archon-workspace-guard.sh /home/devuser/claudeclaw-worktrees/<run-id>
  - id: plan-to-pr
    depends_on: [workspace-guard]
    prompt: |
      Read docs/agent-workflow-routing.md and docs/archon-workspaces.md.

      Convert the objective into a concrete plan-to-PR path for ClaudeClaw.
      Scope changes to the requested objective.
      Preserve commit-based deploy boundaries.
      Respect the isolated worktree at /home/devuser/claudeclaw-worktrees/<run-id>.
  - id: implement
    depends_on: [plan-to-pr]
    prompt: |
      Implement the approved coding objective inside /home/devuser/claudeclaw-worktrees/<run-id>.

      Make focused code, test, and documentation changes.
      Do not copy .env files, SQLite databases, OAuth tokens, or live agent configs.
  - id: validate
    depends_on: [implement]
    bash: |
      cd /home/devuser/claudeclaw-worktrees/<run-id>
      npm run typecheck
      npm test
      npm run build
  - id: report
    depends_on: [validate]
    prompt: |
      Summarize commits, changed files, validation results, deploy implications, and rollback notes.
      Stop before production deploy unless Noah approval is explicit for that exact deploy scope.
