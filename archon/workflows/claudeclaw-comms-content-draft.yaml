name: claudeclaw-comms-content-draft
title: ClaudeClaw comms and content drafting workflow
description: Draft comms and content artifacts without sending or publishing until approval is explicit.
requirement: FLOW-05
summary: Produce drafts/artifacts for Poe, Cole, and Vera without outbound effects unless approved.

policy:
  routing: docs/agent-workflow-routing.md
  owner_personas:
    - Poe
    - Cole
    - Vera
  approval: Noah approval is required before sending, posting, publishing, scheduling, or mutating an external system.
  effect_boundary: does not send or publish without approval

inputs:
  - name: brief
    required: true
    description: Content, comms, follow-up, or publishing brief.
  - name: audience
    required: false
    description: Intended recipient, channel, or audience segment.

steps:
  - id: intake
    name: Clarify draft purpose
    instructions:
      - Determine whether Poe, Cole, or Vera is the best owner.
      - Identify audience, channel, constraints, tone, and source context.
  - id: draft
    name: Produce drafts/artifacts
    instructions:
      - Create draft copy, outline, response, content plan, or review artifact.
      - Include source assumptions and open questions.
  - id: approval-gate
    name: Noah approval gate
    instructions:
      - Stop before send, post, publish, schedule, deploy, or external mutation.
      - Proceed with an outbound effect only when Noah approval names the effect, audience, content, and timing.
  - id: report
    name: Drafting report
    instructions:
      - Provide final draft artifact, suggested next action, approval status, and unsent outbound steps.
