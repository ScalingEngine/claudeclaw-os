name: claudeclaw-strategy-ingest
title: ClaudeClaw strategy and business ingestion workflow
description: Convert strategic inputs into reviewable updates for ClaudeClaw planning surfaces.
requirement: FLOW-03
summary: Turn meeting notes, docs, and direction changes into canonical planning updates.

policy:
  routing: docs/agent-workflow-routing.md
  observability: docs/archon-observability.md
  planning_surfaces:
    - .planning/PROJECT.md
    - .planning/ROADMAP.md
    - .planning/REQUIREMENTS.md

inputs:
  - name: source-material
    required: true
    description: Meeting notes, docs, decision memo, transcript, or direction change.
  - name: scope
    required: false
    description: Milestone, phase, requirements, or planning files expected to change.

interactive: true

nodes:
  - id: classify
    prompt: |
      Identify decisions, requirements, milestone changes, out-of-scope items, and open questions.
      Preserve ClaudeClaw's one-front-door product direction from .planning/PROJECT.md.
  - id: propose-updates
    depends_on: [classify]
    prompt: |
      Propose edits for .planning/PROJECT.md, .planning/ROADMAP.md, .planning/REQUIREMENTS.md, or phase context files.
      Include traceability from source material to each proposed change.
      Keep canonical planning updates reviewable and minimal.
  - id: review-gate
    depends_on: [propose-updates]
    approval:
      message: Review the proposed canonical planning updates before any planning state is treated as accepted.
      capture_response: true
  - id: report
    depends_on: [review-gate]
    prompt: |
      Read docs/archon-observability.md.
      Summarize accepted updates, deferred questions, requirements affected, and follow-up workflow recommendations.
      Include workflow name and run ID or branch.
      Include any reviewer guidance captured at the approval gate: $review-gate.output
